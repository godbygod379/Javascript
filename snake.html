<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-size: 1.2em;
            backdrop-filter: blur(10px);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .score-display {
            font-weight: bold;
        }

        .high-score-display {
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid white;
            background-color: #000;
            display: block;
            margin: 0 auto 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            border-radius: 5px;
        }

        .controls {
            color: white;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
        }

        #startBtn {
            background-color: #4CAF50;
            color: white;
        }

        #startBtn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        #pauseBtn {
            background-color: #ff9800;
            color: white;
        }

        #pauseBtn:hover {
            background-color: #e68900;
            transform: scale(1.05);
        }

        #resetBtn {
            background-color: #f44336;
            color: white;
        }

        #resetBtn:hover {
            background-color: #da190b;
            transform: scale(1.05);
        }

        .instructions {
            color: white;
            font-size: 0.9em;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 5px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .game-over-message {
            color: #ff6b6b;
            font-size: 1.5em;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        <div class="game-info">
            <div>Score: <span class="score-display" id="score">0</span></div>
            <div>High Score: <span class="high-score-display" id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="buttons">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
        <div id="gameOverMessage" class="game-over-message"></div>
        <div class="controls">
            <p>Use Arrow Keys or WASD to move the snake</p>
        </div>
        <div class="instructions">
            <p><strong>How to Play:</strong></p>
            <p>• Move the snake to eat the food (red square)</p>
            <p>• Each food gives you 10 points</p>
            <p>• Don't hit the walls or yourself!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;

        // Snake
        let snake = [
            { x: 10, y: 10 }
        ];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };

        // Food
        let food = generateFood();

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.addEventListener('keydown', handleKeyPress);

        // Update high score display
        document.getElementById('highScore').textContent = highScore;

        function generateFood() {
            let newFood;
            let collision;
            do {
                collision = false;
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                for (let segment of snake) {
                    if (segment.x === newFood.x && segment.y === newFood.y) {
                        collision = true;
                        break;
                    }
                }
            } while (collision);
            return newFood;
        }

        function handleKeyPress(e) {
            const key = e.key.toLowerCase();

            if (key === 'arrowup' || key === 'w') {
                if (direction.y === 0) {
                    nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                }
            } else if (key === 'arrowdown' || key === 's') {
                if (direction.y === 0) {
                    nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                }
            } else if (key === 'arrowleft' || key === 'a') {
                if (direction.x === 0) {
                    nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                }
            } else if (key === 'arrowright' || key === 'd') {
                if (direction.x === 0) {
                    nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                }
            }
        }

        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                gameOver = false;
                document.getElementById('gameOverMessage').textContent = '';
                document.getElementById('startBtn').textContent = 'Resume';
                gameLoop();
            }
        }

        function togglePause() {
            if (gameRunning) {
                gamePaused = !gamePaused;
                document.getElementById('pauseBtn').textContent = gamePaused ? 'Resume' : 'Pause';
                if (!gamePaused) {
                    gameLoop();
                }
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            food = generateFood();
            score = 0;
            gameRunning = false;
            gamePaused = false;
            gameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOverMessage').textContent = '';
            document.getElementById('startBtn').textContent = 'Start Game';
            document.getElementById('pauseBtn').textContent = 'Pause';
            draw();
        }

        function update() {
            direction = nextDirection;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame('Game Over! You hit the wall!');
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame('Game Over! You hit yourself!');
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                food = generateFood();
            } else {
                snake.pop();
            }
        }

        function endGame(message) {
            gameRunning = false;
            gamePaused = false;
            gameOver = true;
            document.getElementById('gameOverMessage').textContent = message;
            document.getElementById('startBtn').textContent = 'Start Game';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            ctx.fillStyle = '#00ff00';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(
                    snake[i].x * gridSize,
                    snake[i].y * gridSize,
                    gridSize - 2,
                    gridSize - 2
                );
            }

            // Draw head with different color
            ctx.fillStyle = '#00dd00';
            ctx.fillRect(
                snake[0].x * gridSize,
                snake[0].y * gridSize,
                gridSize - 2,
                gridSize - 2
            );

            // Draw food
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(
                food.x * gridSize,
                food.y * gridSize,
                gridSize - 2,
                gridSize - 2
            );

            // Draw grid (optional, light lines)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function gameLoop() {
            if (gameRunning && !gamePaused) {
                update();
                draw();
                setTimeout(gameLoop, 100); // Game speed
            } else if (!gamePaused && gameRunning) {
                gameLoop();
            }
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
