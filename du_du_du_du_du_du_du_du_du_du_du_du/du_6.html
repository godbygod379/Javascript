<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovládacie prvky</title>
    <style>
        button {
            width: 64px;
            height: 64px;
            margin: 5px;
            border: none;
            background: none;
            cursor: pointer;
        }
        button img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Ovládacie prvky</h1>
    <button><img src="play.png" alt="Play"></button>
    <button><img src="stop.png" alt="Stop"></button>
    <button><img src="pause.png" alt="Pause"></button>
    <button><img src="zoom_in.png" alt="Zväčšiť"></button>
    <button><img src="zoom_out.png" alt="Zmenšiť"></button>
    <button><img src="rotate_left.png" alt="Rotácia vľavo"></button>
    <button><img src="rotate_right.png" alt="Rotácia vpravo"></button>
</body>
</html>
