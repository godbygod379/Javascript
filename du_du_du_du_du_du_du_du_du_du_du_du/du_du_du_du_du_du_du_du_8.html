<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>DU08 - X rozloženie</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .item {
            position: absolute;
            width: 120px; 
        }

        .i1 {
            top: 50px;
            left: 50px;
        }

        .i2 {
            top: 50px;
            right: 50px;
        }

        .i4 {
            bottom: 50px;
            left: 50px;
        }

        .i5 {
            bottom: 50px;
            right: 50px;
        }

        .i3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .i6 {
            top: 25%;
            left: 25%;
            transform: translate(-50%, -50%);
        }

        .i7 {
            bottom: 25%;
            right: 25%;
            transform: translate(50%, 50%);
        }

        .i8 {
            top: 25%;
            right: 25%;
            transform: translate(50%, -50%);
        }

        .i9 {
            bottom: 25%;
            left: 25%;
            transform: translate(-50%, 50%);
        }

    </style>

</head>
<body>

<div class="container">
    <img src="modry_tipek.jpg" class="item i1" alt="">
    <img src="last_meal.jpg" class="item i2" alt="">
    <img src="School-dinners.jpg" class="item i3" alt="">
    <img src="Cyril Jackson.jpg" class="item i4" alt="">
    <img src="School.jpg" class="item i5" alt="">
    <img src="images.jpg" class="item i6" alt="">
    <img src="goat.jpg" class="item i7" alt="">
    <img src="hi.jpg" class="item i8" alt="">
    <img src="suja.jpg" class="item i9" alt="">
</div>

</body>
</html>
